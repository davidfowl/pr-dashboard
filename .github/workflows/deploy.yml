name: Deploy to Azure Container Apps

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy with Aspire
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Trust Aspire HTTPS certificate
        run: |
          set +e
          aspire certs trust --non-interactive 2>&1 | tee aspire-certs-trust.log
          exit_code=${PIPESTATUS[0]}
          set -e

          if [ "$exit_code" -eq 0 ]; then
            exit 0
          fi

          if grep -q "PartiallyFailedToTrustTheCertificate" aspire-certs-trust.log; then
            echo "::warning::Aspire HTTPS certificate trust partially failed; continuing because hosted Linux runners can fail browser/user trust while the certificate is still usable for CLI diagnostics."
            exit 0
          fi

          exit "$exit_code"

      - name: Check Aspire environment
        run: aspire doctor

      - name: Install frontend dependencies
        run: npm --prefix frontend ci --no-audit --no-fund

      - name: Build
        run: dotnet build pr-timeline-app.slnx --nologo

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy with Aspire
        run: aspire deploy --apphost pr-timeline-app.AppHost/pr-timeline-app.AppHost.csproj --environment Production --non-interactive
        env:
          Azure__SubscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ vars.AZURE_LOCATION }}
          Azure__ResourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          Parameters__git_commit_sha: ${{ github.sha }}
          Parameters__github_client_id: ${{ vars.OAUTH_GITHUB_CLIENT_ID }}
          Parameters__github_client_secret: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          # Web Push (VAPID). Only the private key is sensitive; the public key is shipped to
          # browsers and the subject/key-id are non-secret config, so those live as variables.
          Parameters__web_push_public_key: ${{ vars.WEB_PUSH_PUBLIC_KEY }}
          Parameters__web_push_private_key: ${{ secrets.WEB_PUSH_PRIVATE_KEY }}
          Parameters__web_push_subject: ${{ vars.WEB_PUSH_SUBJECT }}
          Parameters__web_push_key_id: ${{ vars.WEB_PUSH_KEY_ID }}
