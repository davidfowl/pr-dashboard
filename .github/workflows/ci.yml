name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Trust Aspire HTTPS certificate
        run: |
          set +e
          aspire certs trust --non-interactive 2>&1 | tee aspire-certs-trust.log
          exit_code=${PIPESTATUS[0]}
          set -e

          if [ "$exit_code" -eq 0 ]; then
            exit 0
          fi

          if grep -q "PartiallyFailedToTrustTheCertificate" aspire-certs-trust.log; then
            echo "::warning::Aspire HTTPS certificate trust partially failed; continuing because hosted Linux runners can fail browser/user trust while the certificate is still usable for CLI diagnostics."
            exit 0
          fi

          exit "$exit_code"

      - name: Check Aspire environment
        run: aspire doctor

      - name: Install frontend dependencies
        run: npm --prefix frontend ci --no-audit --no-fund

      - name: Test frontend
        run: npm --prefix frontend test

      - name: Restore
        run: dotnet restore pr-timeline-app.slnx --nologo

      - name: Build
        run: dotnet build pr-timeline-app.slnx --no-restore --nologo

      - name: Test
        run: dotnet test pr-timeline-app.slnx --no-build --nologo --logger "console;verbosity=detailed"

      - name: Collect Aspire diagnostics
        if: failure()
        run: |
          set +e
          echo "Aspire resources:"
          aspire ps || true
          echo
          echo "Docker containers:"
          docker ps -a --no-trunc || true
